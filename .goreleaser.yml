version: 2

project_name: lean

before:
  hooks:
    - go mod tidy

builds:
  - main: ./main.go
    binary: lean
    ldflags:
      - -s -w -X github.com/dominionthedev/lean/cmd/lean.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "lean_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: dominionthedev
    name: lean
  name_template: "lean {{.Version}}"
  draft: false
  prerelease: auto