name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Vet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -ldflags="-X github.com/dominionthedev/lean/cmd/lean.Version=ci" ./...

      - name: Cross-compile check
        run: |
          GOOS=linux   GOARCH=amd64  go build ./...
          GOOS=darwin  GOARCH=amd64  go build ./...
          GOOS=darwin  GOARCH=arm64  go build ./...
          GOOS=windows GOARCH=amd64  go build ./...